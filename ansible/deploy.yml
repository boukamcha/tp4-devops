---
- name: Deploy Flask app to Kubernetes
  hosts: local
  vars:
    image: "{{ image }}"
  tasks:
    - name: Create namespace if not exists
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: flask-app

    - name: Deploy Flask application
      kubernetes.core.k8s:
        state: present
        definition: "{{ lookup('template', 'k8s/deployment.yml') | replace('DOCKER_IMAGE_PLACEHOLDER', image) }}"

    - name: Wait for deployment rollout
      kubernetes.core.k8s_rollout_status:
        name: flask-app
        namespace: flask-app
        kind: Deployment
        timeout: 120