apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
  namespace: flask-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true        # don't run as root
        runAsUser: 1000           # run as a normal user
        fsGroup: 2000
      containers:
      - name: flask-app
        image: DOCKER_IMAGE_PLACEHOLDER
        ports:
        - containerPort: 5000
        resources:
          requests:
            memory: "64Mi"        # minimum memory guaranteed
            cpu: "100m"           # minimum CPU guaranteed
          limits:
            memory: "256Mi"       # maximum memory allowed
            cpu: "500m"           # maximum CPU allowed
        securityContext:
          allowPrivilegeEscalation: false   # can't gain more privileges
          readOnlyRootFilesystem: true      # filesystem is read-only
          capabilities:
            drop:
              - ALL               # drop all Linux capabilities
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: flask-app-service
  namespace: flask-app
spec:
  type: NodePort
  selector:
    app: flask-app
  ports:
  - port: 5000
    targetPort: 5000
    nodePort: 30080